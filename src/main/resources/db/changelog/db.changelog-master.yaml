databaseChangeLog:
  - changeSet:
      id: 001-create-characters
      author: nukinderuru
      changes:
        - createTable:
            tableName: characters
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: color
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
  - changeSet:
      id: 002-create-wishes
      author: nukinderuru
      changes:
        - createTable:
            tableName: wishes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: character_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: points
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: wishes
            baseColumnNames: character_id
            constraintName: fk_wishes_character_id
            referencedTableName: characters
            referencedColumnNames: id
            onDelete: RESTRICT
        - createIndex:
            tableName: wishes
            indexName: idx_wishes_character_id
            columns:
              - column:
                  name: character_id
        - createIndex:
            tableName: wishes
            indexName: idx_wishes_active
            columns:
              - column:
                  name: active
  - changeSet:
      id: 003-create-completions
      author: nukinderuru
      changes:
        - createTable:
            tableName: completions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: wish_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: completed_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: completions
            baseColumnNames: wish_id
            constraintName: fk_completions_wish_id
            referencedTableName: wishes
            referencedColumnNames: id
            onDelete: RESTRICT
        - addUniqueConstraint:
            tableName: completions
            columnNames: wish_id, completed_date
            constraintName: uq_completions_wish_id_completed_date
        - createIndex:
            tableName: completions
            indexName: idx_completions_completed_date
            columns:
              - column:
                  name: completed_date
        - createIndex:
            tableName: completions
            indexName: idx_completions_wish_id
            columns:
              - column:
                  name: wish_id
