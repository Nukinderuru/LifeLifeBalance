server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://host.containers.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://host.containers.internal:8080/health;
        proxy_set_header Host $host;
    }

    location /openapi {
        proxy_pass http://host.containers.internal:8080/openapi;
        proxy_set_header Host $host;
    }

    location /swagger {
        proxy_pass http://host.containers.internal:8080/swagger;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
